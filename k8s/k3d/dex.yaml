# Dex — a small OIDC identity provider, the LOCAL stand-in for Entra ID / Okta.
# Its config (issuer, client, test user) is generated by deploy.sh into the
# `dex-config` ConfigMap so no secrets are committed. In production, delete this
# and point oauth2-proxy at your real IdP.
apiVersion: apps/v1
kind: Deployment
metadata: { name: dex, namespace: dex, labels: { app: dex } }
spec:
  replicas: 1
  selector: { matchLabels: { app: dex } }
  template:
    metadata: { labels: { app: dex } }
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          command: ["dex", "serve", "/etc/dex/config.yaml"]
          ports: [{ containerPort: 5556 }]
          volumeMounts: [{ name: config, mountPath: /etc/dex }]
      volumes: [{ name: config, configMap: { name: dex-config } }]
---
apiVersion: v1
kind: Service
metadata: { name: dex, namespace: dex }
spec:
  selector: { app: dex }
  ports: [{ port: 5556, targetPort: 5556 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dex
  namespace: dex
  annotations: { cert-manager.io/cluster-issuer: local-ca }
spec:
  ingressClassName: nginx
  tls: [{ hosts: [dex.localhost], secretName: dex-tls }]
  rules:
    - host: dex.localhost
      http:
        paths:
          - path: /dex
            pathType: Prefix
            backend: { service: { name: dex, port: { number: 5556 } } }
