# Throwaway in-cluster Postgres for LOCAL testing only. In production use a managed
# Postgres (private endpoint, sslmode=require) and delete this file — just point
# DATABASE_URL in values.yaml at it.
apiVersion: apps/v1
kind: Deployment
metadata: { name: interbox-pg, labels: { app: interbox-pg } }
spec:
  replicas: 1
  selector: { matchLabels: { app: interbox-pg } }
  template:
    metadata: { labels: { app: interbox-pg } }
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          env:
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
            - { name: POSTGRES_DB, value: postgres }
          ports: [{ containerPort: 5432 }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: interbox-pg }
spec:
  selector: { app: interbox-pg }
  ports: [{ port: 5432, targetPort: 5432 }]
